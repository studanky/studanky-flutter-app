name: studanky_flutter_app
description: "Mapa studánek a pramenů pro plánování cest v přírodě."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.5.0+1
  dio_smart_retry: ^7.0.1
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_map_location_marker: ^10.2.0
  flutter_native_splash: ^2.4.8
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.2.1
  # Prerelease is required, not accidental: stable freezed (<=3.2.5) pins
  # analyzer <11, but riverpod_generator/json_serializable need analyzer ^12.
  # 3.2.6-dev.1 is the only freezed compatible with analyzer 12. Do not downgrade.
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.0.0
  google_fonts: ^8.1.0
  intl: any
  json_annotation: ^4.12.0
  latlong2: ^0.9.1
  logging: ^1.3.0
  map_launcher: ^4.5.0
  package_info_plus: ^10.1.0
  retrofit: ^4.9.2
  riverpod_annotation: ^4.0.2
  share_plus: ^13.1.0
  shared_preferences: ^2.3.2
  supercluster: ^3.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.3.0
  json_serializable: ^6.7.1
  retrofit_generator: ^10.2.6
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  
  image_path: "assets/icons/ios.png"
  
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/android_fg.png"
  adaptive_icon_monochrome: "assets/icons/android_fg.png"
  # adaptive_icon_foreground_inset: 16
  
  image_path_ios: "assets/icons/ios.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  
  image_path_ios_dark_transparent: "assets/icons/ios_transparent.png"
  
  image_path_ios_tinted_grayscale: "assets/icons/ios_tinted.png"
  desaturate_tinted_to_grayscale_ios: true

flutter_native_splash:
  android: true
  ios: true
  fullscreen: false

  color: "#F0F4F8" 
  color_dark: "#0A1628"
  
  image: "assets/splash/splash_logo.png"
  image_dark: "assets/splash/splash_logo.png"

  android_12:
    color: "#F0F4F8"
    color_dark: "#0A1628"
    
    image: "assets/splash/splash_a12.png"
    image_dark: "assets/splash/splash_a12.png"